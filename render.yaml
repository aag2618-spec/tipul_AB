services:
  - type: web
    name: tipul-app
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && rm -rf .next node_modules/.cache && npm run build
    startCommand: npx prisma db push --accept-data-loss && (npx prisma db execute --file=prisma/sql/session-time-constraint.sql --schema=prisma/schema.prisma || true) && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: UPLOADS_DIR
        value: /opt/render/project/uploads
      - key: CRON_SECRET
        sync: false
      # CRON_SECRET_PREVIOUS — תקופת חפיפה ל-rotation של CRON_SECRET (Stage 2.0).
      # להגדיר ידנית רק בעת רוטציה; להסיר אחרי 24-48ש' שכל ה-cron jobs בריאים.
      - key: CRON_SECRET_PREVIOUS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: MESHULAM_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # --- מייל נכנס (קבלת תשובות מלקוחות) ---
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: INCOMING_EMAIL_SECRET
        sync: false
      # --- תשלומים וחשבוניות ---
      - key: MESHULAM_WEBHOOK_SECRET
        sync: false
      - key: SUMIT_WEBHOOK_SECRET
        sync: false
      # --- התחברות עם גוגל ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # --- אדמין ---
      - key: ADMIN_SECRET
        sync: false
      # SETUP_SECRET נדרש ע"י /api/setup/create-admin ו-/api/setup/make-admin (header x-setup-key)
      # יש להגדיר ידנית ב-Render dashboard (≥32 תווים, openssl rand -base64 32)
      - key: SETUP_SECRET
        sync: false
      # RECEIPT_TOKEN_SECRET — סוד לחתימה על קישורי קבלה ציבוריים
      - key: RECEIPT_TOKEN_SECRET
        sync: false
  # Cron job for 24-hour session reminders (runs every hour)
  - type: cron
    name: session-reminders-24h
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 * * * *"  # Every hour at minute 0
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/reminders" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for 2-hour session reminders (runs every 15 minutes)
  - type: cron
    name: session-reminders-2h
    runtime: node
    region: frankfurt
    plan: free
    schedule: "*/15 * * * *"  # Every 15 minutes
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/reminders-2h" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for subscription reminders (runs daily at 09:00 UTC)
  - type: cron
    name: subscription-reminders
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 9 * * *"  # Every day at 09:00
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/subscription-reminders" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for morning notifications - today's sessions summary (08:00 Israel)
  - type: cron
    name: morning-notifications
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 5 * * *"  # 05:00 UTC (08:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/notifications?type=morning" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for evening notifications - tomorrow's sessions + tasks (20:00 Israel)
  - type: cron
    name: evening-notifications
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 17 * * *"  # 17:00 UTC (20:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/notifications?type=evening" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for evening notifications - LATE NIGHT slot (covers user-customized
  # evening times in the 23:00-03:00 Israel range, e.g. 01:00).
  # מסביר: ה-cron הראשי רץ ב-20:00 ישראל; משתמשים שבחרו שעת ערב מאוחרת
  # נכשלו בבדיקת חלון [שעה, שעה+30) של ה-route ולא קיבלו סיכום.
  # פתרון: יריות נוספות בלילה. duplicate prevention שב-route מבטיח רק שליחה אחת.
  - type: cron
    name: evening-notifications-night
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 21,22,23,0 * * *"  # 21,22,23,00 UTC = 00:00/01:00/02:00/03:00 Israel DST
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/notifications?type=evening" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for monthly debt reminders (runs daily at 09:00 Israel time)
  - type: cron
    name: debt-reminders
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 6 * * *"  # 06:00 UTC (09:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/debt-reminders" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for admin alerts generation (runs daily at 08:00 UTC)
  - type: cron
    name: admin-alerts-generator
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 8 * * *"  # Every day at 08:00
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/generate-alerts" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for trial expiry reminders + expired trial handling (daily at 09:00 Israel)
  - type: cron
    name: trial-expiry
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 6 * * *"  # 06:00 UTC (09:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/trial-expiry" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for impersonation hardkill — terminates impersonation sessions
  # that exceeded 30 minutes (H4 hardening, 2026-05-17). Runs every 30 min.
  # JWT lazy check ב-auth.ts ממילא חוסם את הסשן מיידית; ה-cron רק מנקה את
  # ה-DB rows כדי לא לחסום את ה-partial unique index.
  # Without this, ImpersonationSession rows stay endedAt=null forever when the
  # browser closes without explicit stop, blocking the partial unique index.
  - type: cron
    name: impersonation-hardkill
    runtime: node
    region: frankfurt
    plan: free
    schedule: "*/30 * * * *"  # Every 30 minutes
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/impersonation-hardkill" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for Shabbat outbox - sends pending booking confirmations after Shabbat/Yom Tov (every 15 min)
  - type: cron
    name: booking-outbox
    runtime: node
    region: frankfurt
    plan: free
    schedule: "*/15 * * * *"  # Every 15 minutes
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/booking-outbox" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for DataAccessAuditLog retention (M2) — מוחק רשומות > 12 חודש.
  # תוכן רגיש: כל קריאה לתמלול/סיכום/הקלטה נרשמת. אחרי 12 חודש כבר לא רגולטורי.
  # שבועי, יום ראשון 03:30 ישראל = 00:30 UTC (נפרד מ-audit-log-retention).
  - type: cron
    name: data-access-audit-retention
    runtime: node
    region: frankfurt
    plan: free
    schedule: "30 0 * * 0"  # Every Sunday at 00:30 UTC (03:30 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 300 -X GET "$RENDER_EXTERNAL_URL/api/cron/data-access-audit-retention" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for AdminAuditLog retention — מוחק רשומות > 12 חודש
  # (Stage 2.0 hardening #13). שבועי, יום ראשון 03:00 ישראל = 00:00 UTC.
  # max-time 300s כי ייתכן שצריך כמה batches של 10K (50 max per run).
  - type: cron
    name: audit-log-retention
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 0 * * 0"  # Every Sunday at 00:00 UTC (03:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 300 -X GET "$RENDER_EXTERNAL_URL/api/cron/audit-log-retention" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false
