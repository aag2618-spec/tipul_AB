          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for monthly debt reminders (runs daily at 09:00 Israel time)
  - type: cron
    name: debt-reminders
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 6 * * *"  # 06:00 UTC (09:00 Israel)
