services:
  - type: web
    name: tipul-app
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npx prisma generate && rm -rf .next node_modules/.cache && npm run build
    # C2 (סבב אבטחה 14, 2026-05-19): הוסרה הדגל `--accept-data-loss` כדי שאם
    # יתקיים schema drift Prisma יעצור עם שגיאה במקום למחוק עמודות PHI בשקט.
    # מעבר מלא ל-`prisma migrate deploy` ידרוש baseline ידני (`migrate resolve
    # --applied`) — לא בוצע בסבב הזה כדי לא לשבור deploy. ל-HANDOFF הבא.
    startCommand: npx prisma db push && (npx prisma db execute --file=prisma/sql/session-time-constraint.sql --schema=prisma/schema.prisma || true) && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: UPLOADS_DIR
        value: /opt/render/project/uploads
      - key: CRON_SECRET
        sync: false
      # CRON_SECRET_PREVIOUS — תקופת חפיפה ל-rotation של CRON_SECRET (Stage 2.0).
      # להגדיר ידנית רק בעת רוטציה; להסיר אחרי 24-48ש' שכל ה-cron jobs בריאים.
      - key: CRON_SECRET_PREVIOUS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: MESHULAM_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # --- מייל נכנס (קבלת תשובות מלקוחות) ---
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: INCOMING_EMAIL_SECRET
        sync: false
      # --- תשלומים וחשבוניות ---
      - key: MESHULAM_WEBHOOK_SECRET
        sync: false
      - key: SUMIT_WEBHOOK_SECRET
        sync: false
      # --- התחברות עם גוגל ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # --- אדמין ---
      - key: ADMIN_SECRET
        sync: false
      # SETUP_SECRET נדרש ע"י /api/setup/create-admin ו-/api/setup/make-admin (header x-setup-key)
      # יש להגדיר ידנית ב-Render dashboard (≥32 תווים, openssl rand -base64 32)
      - key: SETUP_SECRET
        sync: false
      # RECEIPT_TOKEN_SECRET — סוד לחתימה על קישורי קבלה ציבוריים
      - key: RECEIPT_TOKEN_SECRET
        sync: false
      # --- Cardcom (תשלומים, סבב אבטחה 14 — H15) ---
      # ADMIN tenant credentials (חיובי מנוי של mytipul). USER tenant נקבע ב-BillingProvider.
      # שמות המשתנים נקבעים ב-`src/lib/cardcom/admin-config.ts:43-45`.
      - key: CARDCOM_ADMIN_TERMINAL_NUMBER
        sync: false
      - key: CARDCOM_ADMIN_API_NAME
        sync: false
      - key: CARDCOM_ADMIN_API_PASSWORD
        sync: false
      # CARDCOM_ADMIN_WEBHOOK_SECRET — HMAC לאימות webhook signatures
      # (`admin-config.ts:53-57`). חסר → `getAdminWebhookSecret()` זורק
      # `CARDCOM_ADMIN_WEBHOOK_SECRET_MISSING` וה-webhook נדחה.
      - key: CARDCOM_ADMIN_WEBHOOK_SECRET
        sync: false
      # Sandbox credentials (אופציונלי, ל-`admin_cardcom_mode='sandbox'`).
      # ברירת מחדל נופלת לקונסטנט בקוד (`CARDCOM_SANDBOX_TERMINAL`/`API_NAME`).
      - key: CARDCOM_SANDBOX_TERMINAL_NUMBER
        sync: false
      - key: CARDCOM_SANDBOX_API_NAME
        sync: false
      - key: CARDCOM_SANDBOX_API_PASSWORD
        sync: false
      # CARDCOM_WEBHOOK_IP_ALLOWLIST — IPs מותרים ל-webhooks של Cardcom (CSV).
      # הגנה בפני webhook forgery — חיוני כי ה-webhook מקבל הוראת חיוב.
      - key: CARDCOM_WEBHOOK_IP_ALLOWLIST
        sync: false
      # CARDCOM_REQUIRE_WEBHOOK_TIMESTAMP — "true" כדי לחייב timestamp ב-webhook
      # (הגנה בפני replay attacks).
      - key: CARDCOM_REQUIRE_WEBHOOK_TIMESTAMP
        sync: false
      # TRUSTED_PROXY_HOPS — מספר proxy hops מהימנים (XFF parsing).
      # ברירת מחדל "1" (Render proxy יחיד). שינוי רק אם יש CF/CDN לפניו.
      - key: TRUSTED_PROXY_HOPS
        sync: false
      # RECORDING_URL_SECRET — חתימת קישורי הקלטות (HMAC). מונע גישה לא
      # מאומתת להקלטות PHI דרך URL ניחוש.
      - key: RECORDING_URL_SECRET
        sync: false
  # Cron job for 24-hour session reminders (runs every hour)
  - type: cron
    name: session-reminders-24h
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 * * * *"  # Every hour at minute 0
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/reminders" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for 2-hour session reminders (runs every 15 minutes)
  - type: cron
    name: session-reminders-2h
    runtime: node
    region: frankfurt
    plan: free
    schedule: "*/15 * * * *"  # Every 15 minutes
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/reminders-2h" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for subscription reminders (runs daily at 09:00 UTC)
  - type: cron
    name: subscription-reminders
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 9 * * *"  # Every day at 09:00
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/subscription-reminders" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for daily summary notifications (morning + evening) — רץ כל חצי שעה 24/7.
  # למה כל 30 דקות 24/7:
  #   • ה-route בודק window של 30 דק' מסביב ל-userMorningTime/userEveningTime.
  #   • cron כל 30 דק' מבטיח שלכל שעה שמשתמש יבחר (00:00-23:30, כל 15 דק')
  #     יהיה cron אחד שייפול בתוך ה-window.
  #   • 24/7 מסלק את כל בעיות ה-DST ושעות הקצה (חורף/קיץ, 04:45, 13:45 וכו').
  # למה cron יחיד (לא נפרד morning/evening):
  #   • ה-route בלי parameter ?type בודק גם morning וגם evening בו-זמנית.
  #   • duplicate prevention בקוד (לפי userId + type + date) מבטיח שליחה
  #     אחת בלבד ליום לכל משתמש לכל סיכום, גם אם 48 cron jobs ירוצו ביום.
  # עלות: 48 ריצות/יום (במקום 43 בהפרדה הקודמת); שיא ב-XX:00 = ~7 בקשות —
  # מתחת ל-CRON_RATE_LIMIT (10/דקה).
  - type: cron
    name: daily-summary-notifications
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0,30 * * * *"  # כל חצי שעה, 24/7
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/notifications" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for monthly debt reminders (runs daily at 09:00 Israel time)
  - type: cron
    name: debt-reminders
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 6 * * *"  # 06:00 UTC (09:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/debt-reminders" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for admin alerts generation (runs daily at 08:00 UTC)
  - type: cron
    name: admin-alerts-generator
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 8 * * *"  # Every day at 08:00
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/generate-alerts" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for trial expiry reminders + expired trial handling (daily at 09:00 Israel)
  - type: cron
    name: trial-expiry
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 6 * * *"  # 06:00 UTC (09:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/trial-expiry" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for impersonation hardkill — terminates impersonation sessions
  # that exceeded 30 minutes (H4 hardening, 2026-05-17). Runs every 30 min.
  # JWT lazy check ב-auth.ts ממילא חוסם את הסשן מיידית; ה-cron רק מנקה את
  # ה-DB rows כדי לא לחסום את ה-partial unique index.
  # Without this, ImpersonationSession rows stay endedAt=null forever when the
  # browser closes without explicit stop, blocking the partial unique index.
  - type: cron
    name: impersonation-hardkill
    runtime: node
    region: frankfurt
    plan: free
    schedule: "*/30 * * * *"  # Every 30 minutes
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/impersonation-hardkill" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for Shabbat outbox - sends pending booking confirmations after Shabbat/Yom Tov (every 15 min)
  - type: cron
    name: booking-outbox
    runtime: node
    region: frankfurt
    plan: free
    schedule: "*/15 * * * *"  # Every 15 minutes
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/booking-outbox" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for DataAccessAuditLog retention (M2) — מוחק רשומות > 12 חודש.
  # תוכן רגיש: כל קריאה לתמלול/סיכום/הקלטה נרשמת. אחרי 12 חודש כבר לא רגולטורי.
  # שבועי, יום ראשון 03:30 ישראל = 00:30 UTC (נפרד מ-audit-log-retention).
  - type: cron
    name: data-access-audit-retention
    runtime: node
    region: frankfurt
    plan: free
    schedule: "30 0 * * 0"  # Every Sunday at 00:30 UTC (03:30 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 300 -X GET "$RENDER_EXTERNAL_URL/api/cron/data-access-audit-retention" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for AdminAuditLog retention — מוחק רשומות > 12 חודש
  # (Stage 2.0 hardening #13). שבועי, יום ראשון 03:00 ישראל = 00:00 UTC.
  # max-time 300s כי ייתכן שצריך כמה batches של 10K (50 max per run).
  - type: cron
    name: audit-log-retention
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 0 * * 0"  # Every Sunday at 00:00 UTC (03:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 300 -X GET "$RENDER_EXTERNAL_URL/api/cron/audit-log-retention" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # R6 (סבב אבטחה 17f) — Data Retention: מחיקת CommunicationLog INCOMING > 7y
  # ו-Notification > 90d. שבועי, יום שני 01:00 UTC (04:00 Israel).
  # אחרי audit-log-retention (יום ראשון 00:00-00:30) — לא חופף.
  - type: cron
    name: data-retention
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 1 * * 1"  # Every Monday at 01:00 UTC (04:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 300 -X GET "$RENDER_EXTERNAL_URL/api/cron/data-retention" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # ===========================================================================
  # סבב אבטחה 14 — C4: 9 crons שהיו ב-codebase אבל לא הוגדרו ב-render.yaml.
  # ===========================================================================

  # Subscription recurring charge — חיוב חוזר אוטומטי של מנויים פעילים.
  # יומי 09:15 ישראל = 06:15 UTC. הוסטה מ-06:00 ל-06:15 כדי לא להתנגש עם
  # debt-reminders/trial-expiry שגם רצים ב-06:00 UTC (סוכן 14a, 2026-05-19).
  # דילוג בשבת/חג מטופל בקוד (route). POST כי הפעולה state-changing (חיוב כספי).
  - type: cron
    name: subscription-recurring-charge
    runtime: node
    region: frankfurt
    plan: free
    schedule: "15 6 * * *"  # 06:15 UTC (09:15 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X POST "$RENDER_EXTERNAL_URL/api/cron/subscription-recurring-charge" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Promote pending tiers — שדרוג tier ל-AI כש-pendingTierEffectiveAt הגיע.
  # יומי 05:00 ישראל = 02:00 UTC.
  - type: cron
    name: promote-pending-tiers
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 2 * * *"  # 02:00 UTC (05:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X POST "$RENDER_EXTERNAL_URL/api/cron/promote-pending-tiers" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cardcom cleanup pending — מסמן CardcomTransactions שתקעו ב-PENDING > 24h
  # כ-EXPIRED. יומי 03:00 UTC.
  - type: cron
    name: cardcom-cleanup-pending
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 3 * * *"  # 03:00 UTC
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 120 -X POST "$RENDER_EXTERNAL_URL/api/cron/cardcom-cleanup-pending" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cardcom webhook stuck — בודק SubscriptionPayments ב-PENDING > 15 דקות עם
  # LowProfileId. אם נמצא — סביר שהמשתמש שילם וה-webhook לא הגיע. יוצר
  # AdminAlert URGENT עם הוראה ללחוץ "סנכרן מ-Cardcom" ב-/admin/users/[id].
  # רץ כל שעה בדקה 5 (לא 0) כדי לא להתנגש עם session-reminders-24h.
  - type: cron
    name: cardcom-webhook-stuck
    runtime: node
    region: frankfurt
    plan: free
    schedule: "5 * * * *"  # Every hour at minute 5
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X POST "$RENDER_EXTERNAL_URL/api/cron/cardcom-webhook-stuck" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cardcom invoice sync — מסנכרן CardcomInvoice עם Cardcom (source of truth).
  # יומי 04:00 UTC. מטפל גם ADMIN וגם USER (per BillingProvider).
  - type: cron
    name: cardcom-invoice-sync
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 4 * * *"  # 04:00 UTC
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 300 -X POST "$RENDER_EXTERNAL_URL/api/cron/cardcom-invoice-sync" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cardcom PDF backup — מגבה PDFs של חשבוניות ל-disk מקומי.
  # כל 10 דקות (לתפוס invoices חדשים מהר).
  - type: cron
    name: cardcom-pdf-backup
    runtime: node
    region: frankfurt
    plan: free
    schedule: "*/10 * * * *"  # Every 10 minutes
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 120 -X POST "$RENDER_EXTERNAL_URL/api/cron/cardcom-pdf-backup" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cardcom PDF rehash — בודק SHA-256 של PDFs מגובים מול hash שמור (bit-rot detection).
  # חודשי, 1 לחודש 03:00 UTC. נדרש לחוק החשבונאות (7 שנים readability).
  - type: cron
    name: cardcom-pdf-rehash
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 3 1 * *"  # 1st of month, 03:00 UTC
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 600 -X POST "$RENDER_EXTERNAL_URL/api/cron/cardcom-pdf-rehash" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cleanup idempotency — מוחק מפתחות idempotency שפגו (Stage 1.18.2).
  # יומי 04:00 ישראל = 01:00 UTC. GET.
  - type: cron
    name: cleanup-idempotency
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 1 * * *"  # 01:00 UTC (04:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/cleanup-idempotency" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Departure deadlines — בודק deadlines של מעבר תיק מקליניקה לקליניקה.
  # יומי 10:00 ישראל = 07:00 UTC. GET (idempotent).
  - type: cron
    name: departure-deadlines
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 7 * * *"  # 07:00 UTC (10:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 120 -X GET "$RENDER_EXTERNAL_URL/api/cron/departure-deadlines" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Fix stuck payments — מתקן Payments שסכומם הגיע ל-expectedAmount אבל
  # markFullyPaid לא רץ. יומי 08:00 ישראל = 05:00 UTC. GET.
  - type: cron
    name: fix-stuck-payments
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 5 * * *"  # 05:00 UTC (08:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 120 -X GET "$RENDER_EXTERNAL_URL/api/cron/fix-stuck-payments" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # M13.6 (סבב אבטחה 13) — Recording orphan cleanup.
  # מוחק הקלטות יתומות (clientId=null AND sessionId=null) שעברו 90 ימים.
  # כולל מחיקת audio file מ-disk + DB row. עקרון "צמצום מידע" (חוק הגנת
  # הפרטיות + תקנות 2017 על PHI). יומי 04:00 ישראל = 01:00 UTC, נפרד
  # משאר retention crons כדי לא להעמיס DB.
  - type: cron
    name: recording-orphan-cleanup
    runtime: node
    region: frankfurt
    plan: free
    schedule: "30 1 * * *"  # 01:30 UTC (04:30 Israel). הוסט מ-01:00 ל-01:30 כדי לא להתנגש עם cleanup-idempotency (סוכן 14a, 2026-05-19).
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 300 -X GET "$RENDER_EXTERNAL_URL/api/cron/recording-orphan-cleanup" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false
