services:
  - type: web
    name: tipul-app
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && rm -rf .next node_modules/.cache && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: UPLOADS_DIR
        value: /opt/render/project/uploads
      - key: CRON_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: MESHULAM_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # --- מייל נכנס (קבלת תשובות מלקוחות) ---
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: INCOMING_EMAIL_SECRET
        sync: false
      # --- תשלומים וחשבוניות ---
      - key: MESHULAM_WEBHOOK_SECRET
        sync: false
      - key: SUMIT_WEBHOOK_SECRET
        sync: false
      # --- התחברות עם גוגל ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # --- אדמין ---
      - key: ADMIN_SECRET
        sync: false
  # Cron job for 24-hour session reminders (runs every hour)
  - type: cron
    name: session-reminders-24h
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 * * * *"  # Every hour at minute 0
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/reminders" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for 2-hour session reminders (runs every 15 minutes)
  - type: cron
    name: session-reminders-2h
    runtime: node
    region: frankfurt
    plan: free
    schedule: "*/15 * * * *"  # Every 15 minutes
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/reminders-2h" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for subscription reminders (runs daily at 09:00 UTC)
  - type: cron
    name: subscription-reminders
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 9 * * *"  # Every day at 09:00
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/subscription-reminders" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for morning notifications - today's sessions summary (08:00 Israel)
  - type: cron
    name: morning-notifications
    runtime: node
    region: frankfurt
    plan: free
    schedule: "0 5 * * *"  # 05:00 UTC (08:00 Israel)
    buildCommand: echo "No build needed"
    startCommand: |
      curl -s --max-time 60 -X GET "$RENDER_EXTERNAL_URL/api/cron/notifications?type=morning" \
        -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: tipul-app
          property: url
      - key: CRON_SECRET
        sync: false

  # Cron job for evening notifications - tomorrow's sessions + tasks (20:00 Israel)
  - type: cron
    name: evening-notifications
    runtime: node
    region: frankfurt
    plan: free
