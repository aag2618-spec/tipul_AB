name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: ESLint security check
        run: npx eslint --max-warnings 0 2>&1 || true

  deploy:
    runs-on: ubuntu-latest
    needs: security-audit
    if: always()
    steps:
      - name: Trigger Render Deploy
        # ⚠️ היסטוריה (2026-05-27): אחרי maintenance ב-Render, ה-curl המקורי
        # החזיר "success" גם כש-Render דחה את הבקשה (401/404), כי לא היה
        # `--fail`. לקח: תמיד לבדוק את HTTP status + להדפיס את ה-response
        # ל-logs כדי שניתן יהיה לאבחן בעיות API key/service ID במהירות.
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" \
            -X POST "https://api.render.com/v1/services/srv-d59i6pbuibrs73baocgg/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP Status: $http_code"
          echo "Render API response:"
          echo "$body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Render API rejected the deploy request (HTTP $http_code). Check RENDER_API_KEY validity and service ID."
            exit 1
          fi
