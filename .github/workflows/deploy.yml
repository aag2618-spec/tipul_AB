name: CI (security audit)

# הערה (2026-06-02): הוסר מכאן job בשם "deploy" שקרא ל-Render API והפעיל פריסה
# *נוספת* על כל push — מה שגרם לכל commit להיפרס פעמיים (ה-Auto-Deploy המובנה של
# Render + הקריאה הזו). הפריסה נשארת כעת על ה-Auto-Deploy המובנה של Render בלבד.
# אם אי-פעם נכבה את ה-Auto-Deploy ונרצה לפרוס מכאן — להחזיר job שעושה
# POST ל-/v1/services/<id>/deploys עם secrets.RENDER_API_KEY.

on:
  push:
    branches:
      - main

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: ESLint security check
        run: npx eslint --max-warnings 0 2>&1 || true
